<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Product</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="page-container">

        <a href="/products" class="back-btn">
            ← Back to Products
        </a>

        <div class="form-card">

            <h1>Edit Product</h1>

            <form method="POST">

                <div class="form-group">

                    <label>
                        Product Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        value="{{ product.name }}"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Price
                    </label>

                    <input
                        type="number"
                        name="price"
                        value="{{ product.price }}"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Stock
                    </label>

                    <input
                        type="number"
                        name="stock"
                        value="{{ product.stock }}"
                    >

                </div>

                <button type="submit" class="submit-btn">
                    Update Product
                </button>

            </form>

        </div>

    </div>

</body>
</html>
